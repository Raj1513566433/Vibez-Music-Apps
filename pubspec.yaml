name: vibez
description: "A fully functional music player app built with Flutter"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Audio playback
  just_audio: ^0.9.38
  on_audio_query: ^2.9.0
  
  # State management
  provider: ^6.1.2
  
  # Local storage
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash.png
    - assets/images/banner1.jpg
    - assets/images/banner2.jpg
    - assets/images/banner3.jpg
    - assets/images/banner4.jpg
    - assets/images/banner5.jpg
   

  fonts:
    - family: Knewave
      fonts:
        - asset: assets/fonts/Knewave-Regular.ttf
    - family: Alkalami
      fonts:
        - asset: assets/fonts/Alkalami-Regular.ttf